<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal planner</title>
    <link rel="icon" href="./icons/icon-192.png" type="image/png">
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <main>
        <div class="search-container">
            <div class="search-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#fff"><path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/></svg>
                <input placeholder="Search" class="search-input">
                <button class="search-clear">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#fff"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
                </button>
            </div>
        </div>
        
        <div class="planned-wrapper item-wrapper">
            <fieldset>
                <legend>Planned</legend>
            </fieldset>
            <div class="item-container"></div>
        </div>
        
        <div class="foodlist-wrapper item-wrapper">
            <fieldset>
                <legend>
                    Food list
                </legend>
            </fieldset>
            <div class="item-container"></div>
        </div>
    </main>

    <div class="buttons">
        <input type="file" id="uploadInput" accept=".json,application/json" hidden>
        <button class="upload-btn">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M440-320v-326L336-542l-56-58 200-200 200 200-56 58-104-104v326h-80ZM240-160q-33 0-56.5-23.5T160-240v-120h80v120h480v-120h80v120q0 33-23.5 56.5T720-160H240Z"/></svg>
        </button>
        <button class="add-btn">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#fff"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg>
        </button>
        <button class="backup-btn">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M480-320 280-520l56-58 104 104v-326h80v326l104-104 56 58-200 200ZM240-160q-33 0-56.5-23.5T160-240v-120h80v120h480v-120h80v120q0 33-23.5 56.5T720-160H240Z"/></svg>
        </button>
    </div>
    
    <div class="contextmenu">
        <button data-action="today" class="contextbtn">Set today</button>
        <button data-action="switch" class="contextbtn">Switch</button>
        <div>
            <label for="dateInput">Set date</label>
            <input id="dateInput" type="date">
        </div>
        <button data-action="history" class="contextbtn">View history</button>
        <div>
            <label for="nameInput">Set name</label>
            <input id="nameInput" type="text">
        </div>
        <button data-action="delete" class="contextbtn">Delete</button>
    </div>
    
    <div class="history-screen">
        <h3 class="title">Meal</h3>
        <div class="date-container"></div>
    </div>
    
    <template class="item-template">
        <div class="item">
            <div class="date"></div>
            <div class="name"></div>
            <div class="count"></div>
            <div class="drag-handle">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#fff"><path d="M480-80 240-320l57-57 183 183 183-183 57 57L480-80ZM298-584l-58-56 240-240 240 240-58 56-182-182-182 182Z"/></svg>
            </div>
        </div>
    </template>
</body>
</html>
